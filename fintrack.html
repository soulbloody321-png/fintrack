<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>fintrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424; --bg4: #2e2e2e;
    --text: #f0ede8; --text2: #a09d98; --text3: #5a5855;
    --green: #3dba8a; --red: #e05c4a; --amber: #d4920f;
    --blue: #4a90d9; --purple: #8b7ed8; --pink: #d45c8a;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --radius: 12px; --radius-sm: 8px;
    --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; max-width: 520px; margin: 0 auto; min-height: 100dvh; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: calc(16px + var(--safe-top)) 20px 12px; background: var(--bg); position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border); }
  .logo { font-family: var(--mono); font-size: 17px; font-weight: 500; color: var(--text); letter-spacing: -0.5px; }
  .logo span { color: var(--green); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .sync-indicator { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: background 0.3s; flex-shrink: 0; }
  .sync-indicator.syncing { background: var(--amber); animation: pulse 1s infinite; }
  .sync-indicator.ok { background: var(--green); }
  .sync-indicator.err { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .month-nav { display: flex; align-items: center; gap: 6px; }
  .nav-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .nav-btn:hover { background: var(--bg4); color: var(--text); }
  .month-label { font-family: var(--mono); font-size: 13px; color: var(--text2); min-width: 100px; text-align: center; }

  .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 16px 20px 8px; }
  .scard { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .scard-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; font-family: var(--mono); }
  .scard-value { font-size: 16px; font-weight: 600; font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .scard-value.inc { color: var(--green); }
  .scard-value.exp { color: var(--red); }

  .chart-area { padding: 8px 20px 0; display: flex; flex-direction: column; align-items: center; }
  .donut-container { position: relative; width: 200px; height: 200px; cursor: pointer; }
  .donut-container canvas { position: absolute; top:0; left:0; width:100%!important; height:100%!important; }
  .donut-center { position: absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; gap:2px; }
  .dc-pct { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .dc-amount { font-family: var(--mono); font-size: 18px; font-weight: 500; color: var(--text); }
  .dc-cat { font-size: 11px; color: var(--text2); max-width: 80px; text-align: center; line-height: 1.3; }
  .legend { display: flex; flex-wrap: wrap; gap: 6px 14px; padding: 10px 20px 4px; justify-content: center; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); cursor: pointer; transition: color 0.15s; }
  .leg-item:hover { color: var(--text); }
  .leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .tabs { display: flex; padding: 12px 20px 0; gap: 4px; border-bottom: 1px solid var(--border); }
  .tab { flex: 1; text-align: center; padding: 8px 4px 10px; font-size: 12px; font-family: var(--mono); letter-spacing: 0.02em; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab-content { flex: 1; overflow-y: auto; padding: 12px 20px 100px; }

  .tx-group-label { font-size: 11px; font-family: var(--mono); color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; padding: 10px 0 6px; }
  .tx-item { display: flex; align-items: center; gap: 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; margin-bottom: 5px; transition: border-color 0.15s; }
  .tx-item:hover { border-color: var(--border2); }
  .tx-dot-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; }
  .tx-dot { width: 9px; height: 9px; border-radius: 50%; }
  .tx-subdot { width: 5px; height: 5px; border-radius: 50%; opacity: 0.5; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-top { display: flex; align-items: baseline; gap: 6px; }
  .tx-cat { font-size: 13px; font-weight: 500; color: var(--text); }
  .tx-subcat { font-size: 11px; color: var(--text3); }
  .tx-note { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .tx-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
  .tx-amount { font-family: var(--mono); font-size: 14px; font-weight: 500; }
  .tx-date-label { font-family: var(--mono); font-size: 10px; color: var(--text3); }
  .tx-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 14px; padding: 2px 4px; line-height: 1; transition: color 0.15s; }
  .tx-del:hover { color: var(--red); }
  .empty-state { text-align: center; padding: 40px 0; color: var(--text3); font-size: 14px; font-family: var(--mono); }

  .cat-section-title { font-size: 11px; font-family: var(--mono); color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 0 6px; }
  .cat-row { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 13px; margin-bottom: 5px; }
  .cat-row-top { display: flex; align-items: center; gap: 8px; }
  .cat-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cat-name-text { flex: 1; font-size: 14px; color: var(--text); }
  .cat-amount-text { font-family: var(--mono); font-size: 13px; color: var(--text2); }
  .cat-bar-bg { height: 2px; background: var(--bg4); border-radius: 2px; margin-top: 7px; }
  .cat-bar-fill { height: 2px; border-radius: 2px; transition: width 0.4s ease; }
  .subcat-list { padding-left: 18px; margin-top: 4px; display: flex; flex-direction: column; gap: 2px; }
  .subcat-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
  .subcat-dot { width: 5px; height: 5px; border-radius: 50%; opacity: 0.6; flex-shrink: 0; }
  .subcat-name { flex: 1; font-size: 12px; color: var(--text2); }
  .subcat-amt { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .subcat-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 12px; padding: 0 2px; transition: color 0.15s; }
  .subcat-del:hover { color: var(--red); }
  .cat-actions { display: flex; gap: 6px; margin-top: 6px; align-items: center; }
  .add-sub-btn { font-size: 11px; color: var(--text3); background: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; cursor: pointer; font-family: var(--mono); transition: all 0.15s; }
  .add-sub-btn:hover { color: var(--text2); border-color: var(--border2); }
  .del-cat-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; margin-left: auto; padding: 2px 4px; transition: color 0.15s; }
  .del-cat-btn:hover { color: var(--red); }
  .add-cat-form { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 13px; margin-top: 8px; }
  .form-row { display: flex; gap: 8px; align-items: center; }
  .add-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 13px; font-family: var(--font); outline: none; }
  .add-input:focus { border-color: var(--green); }
  .add-input::placeholder { color: var(--text3); }
  .add-btn { background: var(--green); border: none; color: #0f0f0f; border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); white-space: nowrap; transition: opacity 0.15s; }
  .add-btn:hover { opacity: 0.85; }

  .settings-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .settings-title { font-size: 12px; font-family: var(--mono); color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 10px; }
  .settings-info { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .settings-btn { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); border-radius: var(--radius-sm); padding: 9px 14px; font-size: 13px; cursor: pointer; font-family: var(--font); transition: all 0.15s; width: 100%; margin-top: 8px; }
  .settings-btn:hover { color: var(--text); background: var(--bg4); }
  .settings-btn.danger { border-color: rgba(224,92,74,0.3); color: var(--red); }
  .settings-btn.danger:hover { background: rgba(224,92,74,0.1); }
  .status-msg { font-size: 12px; font-family: var(--mono); margin-top: 6px; }
  .status-ok { color: var(--green); }
  .status-err { color: var(--red); }

  .fab { position: fixed; bottom: calc(24px + var(--safe-bottom)); right: 50%; transform: translateX(50%); background: var(--green); color: #0f0f0f; border: none; border-radius: 50%; width: 58px; height: 58px; font-size: 28px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; transition: transform 0.2s, opacity 0.15s; box-shadow: 0 4px 20px rgba(61,186,138,0.35); }
  .fab:hover { transform: translateX(50%) scale(1.06); }
  .fab:active { transform: translateX(50%) scale(0.96); }
  .fab.open { transform: translateX(50%) rotate(45deg); }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-bg.visible { opacity: 1; pointer-events: all; }
  .modal { background: var(--bg2); border-radius: 20px 20px 0 0; width: 100%; max-width: 520px; padding: 20px 20px calc(20px + var(--safe-bottom)); border-top: 1px solid var(--border2); transform: translateY(20px); transition: transform 0.25s ease; }
  .modal-bg.visible .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 3px; background: var(--bg4); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 14px; }
  .type-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
  .type-btn { flex: 1; padding: 9px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); cursor: pointer; font-size: 13px; font-family: var(--mono); text-align: center; transition: all 0.15s; }
  .type-btn.active-exp { background: rgba(224,92,74,0.15); color: var(--red); border-color: rgba(224,92,74,0.4); }
  .type-btn.active-inc { background: rgba(61,186,138,0.15); color: var(--green); border-color: rgba(61,186,138,0.4); }
  .field-label { font-size: 11px; font-family: var(--mono); color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; margin: 10px 0 5px; }
  .field-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 15px; font-family: var(--font); outline: none; transition: border-color 0.15s; }
  .field-input:focus { border-color: var(--green); }
  .field-input::placeholder { color: var(--text3); }
  select.field-input option { background: var(--bg3); }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .btn-cancel { flex: 1; padding: 11px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: none; cursor: pointer; color: var(--text2); font-size: 14px; font-family: var(--font); }
  .btn-save { flex: 2; padding: 11px; border: none; border-radius: var(--radius-sm); background: var(--green); color: #0f0f0f; cursor: pointer; font-size: 14px; font-weight: 600; font-family: var(--font); transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.85; }
  .modal-status { font-size: 12px; font-family: var(--mono); text-align: center; padding: 4px 0; min-height: 18px; }

  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 999; transition: opacity 0.3s; }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-logo { font-family: var(--mono); font-size: 22px; color: var(--text2); }
  .loading-logo span { color: var(--green); }
  .loading-dots { display: flex; gap: 6px; }
  .loading-dots div { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s infinite; }
  .loading-dots div:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots div:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.7);opacity:0.4} 40%{transform:scale(1);opacity:1} }

  @media (min-width: 520px) {
    .fab { right: calc(50% - 260px + 24px); transform: none; }
    .fab:hover { transform: scale(1.06); }
    .fab.open { transform: rotate(45deg); }
    .fab:active { transform: scale(0.96); }
  }
  @media (prefers-color-scheme: light) {
    :root { --bg:#f7f5f2; --bg2:#ffffff; --bg3:#f0ede8; --bg4:#e5e2dd; --text:#1a1814; --text2:#6b6760; --text3:#a09d98; --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.12); }
    .fab { box-shadow: 0 4px 20px rgba(61,186,138,0.4); }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-logo">fin<span>track</span></div>
  <div class="loading-dots"><div></div><div></div><div></div></div>
</div>

<div class="header">
  <div class="logo">fin<span>track</span></div>
  <div class="header-right">
    <div class="sync-indicator" id="syncDot" title="estado sincronización"></div>
    <div class="month-nav">
      <button class="nav-btn" id="prevMonth">‹</button>
      <div class="month-label" id="monthLabel">—</div>
      <button class="nav-btn" id="nextMonth">›</button>
    </div>
  </div>
</div>

<div class="summary">
  <div class="scard"><div class="scard-label">ingresos</div><div class="scard-value inc" id="totalInc">0 €</div></div>
  <div class="scard"><div class="scard-label">gastos</div><div class="scard-value exp" id="totalExp">0 €</div></div>
  <div class="scard"><div class="scard-label">balance</div><div class="scard-value" id="totalBal">0 €</div></div>
</div>

<div class="chart-area">
  <div class="donut-container">
    <canvas id="donutCanvas" width="200" height="200" role="img" aria-label="Gráfico de gastos por categoría"></canvas>
    <div class="donut-center">
      <div class="dc-pct" id="dcPct">gastos</div>
      <div class="dc-amount" id="dcAmt">0 €</div>
      <div class="dc-cat" id="dcCat"></div>
    </div>
  </div>
  <div class="legend" id="legend"></div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="tx">movimientos</div>
  <div class="tab" data-tab="cat">categorías</div>
  <div class="tab" data-tab="settings">ajustes</div>
</div>
<div class="tab-content" id="tabContent"></div>

<button class="fab" id="fabBtn" aria-label="Añadir transacción">+</button>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nueva transacción</div>
    <div class="type-toggle">
      <div class="type-btn active-exp" id="typeExp" onclick="setType('expense')">gasto</div>
      <div class="type-btn" id="typeInc" onclick="setType('income')">ingreso</div>
    </div>
    <div class="field-label">importe (€)</div>
    <input type="number" class="field-input" id="txAmount" placeholder="0,00" min="0" step="0.01">
    <div class="field-label">categoría</div>
    <select class="field-input" id="txCat" onchange="populateSubcats()"></select>
    <div class="field-label">subcategoría <span style="color:var(--text3);font-size:10px">(opcional)</span></div>
    <select class="field-input" id="txSubcat"></select>
    <div class="field-label">nota <span style="color:var(--text3);font-size:10px">(opcional)</span></div>
    <input type="text" class="field-input" id="txNote" placeholder="descripción...">
    <div class="field-label">fecha</div>
    <input type="date" class="field-input" id="txDate">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">cancelar</button>
      <button class="btn-save" onclick="saveTx()">guardar</button>
    </div>
    <div class="modal-status" id="modalStatus"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const SUPABASE_URL = 'https://sswktibdpxqrumsqsegi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_A4Lahtw5TjoD3hajMJITfw_o-p2zgH_';

const PALETTE = ['#3dba8a','#e05c4a','#4a90d9','#d4920f','#d45c8a','#8b7ed8','#6aab3a','#888580','#e09a3a','#4abbd4','#a05cb8','#c4b840'];
const MONTHS  = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

// ── SUPABASE REST HELPERS ────────────────────────────────────────
const headers = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'return=representation'
};

async function sbGet(table, params = '') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST', headers, body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpdate(table, id, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'PATCH', headers, body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(table, id) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'DELETE', headers
  });
  if (!r.ok) throw new Error(await r.text());
}
async function sbUpsert(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: { ...headers, 'Prefer': 'resolution=merge-duplicates,return=representation' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── STATE ────────────────────────────────────────────────────────
let transactions = [];
let categories   = [];
let viewYear     = new Date().getFullYear();
let viewMonth    = new Date().getMonth();
let txType       = 'expense';
let donutChart   = null;
let activeCatId  = null;
let activeTab    = 'tx';

const DEFAULT_CATS = [
  { id:'c1', name:'alimentación', color:'#3dba8a', subcats:['supermercado','mercado','alimentación online'], position:0 },
  { id:'c2', name:'transporte',   color:'#4a90d9', subcats:['gasolina','taxi/uber','transporte público','parking'], position:1 },
  { id:'c3', name:'hogar',        color:'#d4920f', subcats:['alquiler/hipoteca','suministros','mantenimiento','muebles'], position:2 },
  { id:'c4', name:'ocio',         color:'#8b7ed8', subcats:['cine/teatro','viajes','deporte','suscripciones'], position:3 },
  { id:'c5', name:'salud',        color:'#e05c4a', subcats:['farmacia','médico','gym','seguros'], position:4 },
  { id:'c6', name:'ropa',         color:'#d45c8a', subcats:['ropa','zapatos','accesorios'], position:5 },
  { id:'c7', name:'restaurantes', color:'#e09a3a', subcats:['comida rápida','restaurante','bar/cafetería','delivery'], position:6 },
  { id:'c8', name:'otros',        color:'#888580', subcats:[], position:7 },
];

// ── SYNC STATUS ──────────────────────────────────────────────────
function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-indicator ' + status;
}

// ── INIT ─────────────────────────────────────────────────────────
async function init() {
  setSyncStatus('syncing');
  try {
    // Load categories; seed defaults if empty
    const cats = await sbGet('categories', 'order=position.asc');
    if (cats.length === 0) {
      await sbUpsert('categories', DEFAULT_CATS);
      categories = DEFAULT_CATS;
    } else {
      categories = cats;
    }
    // Load all transactions
    transactions = await sbGet('transactions', 'order=date.desc');
    setSyncStatus('ok');
  } catch(e) {
    console.error(e);
    setSyncStatus('err');
    // Fallback to localStorage cache
    try {
      const c = localStorage.getItem('ft_cats');
      const t = localStorage.getItem('ft_txs');
      if (c) categories = JSON.parse(c);
      else categories = DEFAULT_CATS;
      if (t) transactions = JSON.parse(t);
    } catch(_) { categories = DEFAULT_CATS; }
  }
  // Cache locally as fallback
  localStorage.setItem('ft_cats', JSON.stringify(categories));
  localStorage.setItem('ft_txs', JSON.stringify(transactions));

  document.getElementById('loadingOverlay').classList.add('hidden');
  render();
}

// ── HELPERS ──────────────────────────────────────────────────────
function fmt(n) { return n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €'; }
function fmtShort(n) { return n >= 10000 ? (n/1000).toFixed(1)+'k €' : n.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})+' €'; }
function catById(id) { return categories.find(c => c.id === id) || {name:id, color:'#888580', subcats:[]}; }
function getMonthTx() {
  return transactions.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
  });
}

// ── RENDER ───────────────────────────────────────────────────────
function render() {
  document.getElementById('monthLabel').textContent = MONTHS[viewMonth] + ' ' + viewYear;
  const txs = getMonthTx();
  const exps = txs.filter(t => t.type === 'expense');
  const incs = txs.filter(t => t.type === 'income');
  const totalExp = exps.reduce((s,t) => s+t.amount, 0);
  const totalInc = incs.reduce((s,t) => s+t.amount, 0);
  const bal = totalInc - totalExp;

  document.getElementById('totalInc').textContent = fmtShort(totalInc);
  document.getElementById('totalExp').textContent = fmtShort(totalExp);
  const balEl = document.getElementById('totalBal');
  balEl.textContent = fmtShort(Math.abs(bal));
  balEl.style.color = bal >= 0 ? 'var(--green)' : 'var(--red)';

  renderDonut(exps, totalExp);
  renderLegend(exps);
  renderTab();
}

function renderDonut(exps, total) {
  const bycat = {};
  exps.forEach(t => { bycat[t.category] = (bycat[t.category]||0) + t.amount; });
  const catIds = Object.keys(bycat);
  const data   = catIds.map(id => bycat[id]);
  const colors = catIds.map(id => catById(id).color);
  const labels = catIds.map(id => catById(id).name);

  if (donutChart) { donutChart.destroy(); donutChart = null; }
  const ctx = document.getElementById('donutCanvas').getContext('2d');

  if (!data.length) {
    ctx.clearRect(0,0,200,200);
    ctx.beginPath(); ctx.arc(100,100,72,0,Math.PI*2);
    ctx.strokeStyle='rgba(128,128,128,0.1)'; ctx.lineWidth=26; ctx.stroke();
    setCenter('gastos','0 €',''); return;
  }

  const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--bg2').trim() || '#1a1a1a';
  donutChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: bgColor, hoverOffset: 8 }] },
    options: {
      responsive: false, cutout: '68%',
      plugins: { legend:{display:false}, tooltip:{enabled:false} },
      onClick(e, els) {
        if (els.length) {
          const id = catIds[els[0].index];
          activeCatId = activeCatId === id ? null : id;
          if (activeCatId) setCenter(Math.round(bycat[id]/total*100)+'%', fmt(bycat[id]), catById(id).name);
          else setCenter('gastos', fmt(total), '');
        } else { activeCatId = null; setCenter('gastos', fmt(total), ''); }
      },
      onHover(e, els) {
        if (!activeCatId) {
          if (els.length) { const id=catIds[els[0].index]; setCenter(Math.round(bycat[id]/total*100)+'%', fmt(bycat[id]), catById(id).name); }
          else setCenter('gastos', fmt(total), '');
        }
      }
    }
  });
  if (activeCatId && bycat[activeCatId]) setCenter(Math.round(bycat[activeCatId]/total*100)+'%', fmt(bycat[activeCatId]), catById(activeCatId).name);
  else setCenter('gastos', fmt(total), '');
}

function setCenter(pct, amt, cat) {
  document.getElementById('dcPct').textContent = pct;
  document.getElementById('dcAmt').textContent = amt;
  document.getElementById('dcCat').textContent = cat;
}

function renderLegend(exps) {
  const bycat = {};
  exps.forEach(t => { bycat[t.category] = (bycat[t.category]||0)+t.amount; });
  const sorted = Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  document.getElementById('legend').innerHTML = sorted.map(([id]) => {
    const c = catById(id);
    return `<div class="leg-item"><span class="leg-dot" style="background:${c.color}"></span>${c.name}</div>`;
  }).join('');
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    activeTab = t.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    renderTab();
  });
});

function renderTab() {
  if (activeTab === 'tx') renderTxTab();
  else if (activeTab === 'cat') renderCatTab();
  else renderSettingsTab();
}

function renderTxTab() {
  const txs = getMonthTx().sort((a,b) => new Date(b.date)-new Date(a.date));
  const el = document.getElementById('tabContent');
  if (!txs.length) { el.innerHTML = '<div class="empty-state">sin movimientos este mes</div>'; return; }

  const groups = {};
  txs.forEach(t => {
    const d = new Date(t.date+'T12:00:00');
    const key = d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });

  el.innerHTML = Object.entries(groups).map(([day, list]) =>
    `<div class="tx-group-label">${day}</div>` +
    list.map(t => {
      const c = catById(t.category);
      const sign = t.type==='expense' ? '−' : '+';
      const col  = t.type==='expense' ? 'var(--red)' : 'var(--green)';
      const sub  = t.subcategory ? `<span class="tx-subcat">· ${t.subcategory}</span>` : '';
      return `<div class="tx-item">
        <div class="tx-dot-wrap">
          <div class="tx-dot" style="background:${c.color}"></div>
          ${t.subcategory ? `<div class="tx-subdot" style="background:${c.color}"></div>` : ''}
        </div>
        <div class="tx-info">
          <div class="tx-top"><span class="tx-cat">${c.name}</span>${sub}</div>
          ${t.note ? `<div class="tx-note">${t.note}</div>` : ''}
        </div>
        <div class="tx-right">
          <span class="tx-amount" style="color:${col}">${sign}${fmt(t.amount)}</span>
          <button class="tx-del" onclick="deleteTx('${t.id}')" aria-label="eliminar">×</button>
        </div>
      </div>`;
    }).join('')
  ).join('');
}

function renderCatTab() {
  const exps = getMonthTx().filter(t => t.type==='expense');
  const bycat = {}, bysubcat = {};
  exps.forEach(t => {
    bycat[t.category] = (bycat[t.category]||0)+t.amount;
    if (t.subcategory) { const k=t.category+'||'+t.subcategory; bysubcat[k]=(bysubcat[k]||0)+t.amount; }
  });
  const maxVal = Math.max(...Object.values(bycat), 1);
  const totalExp = Object.values(bycat).reduce((a,b)=>a+b, 0) || 1;

  document.getElementById('tabContent').innerHTML = `
    <div class="cat-section-title">categorías del mes</div>
    <div id="catList">
      ${categories.map(c => {
        const amt = bycat[c.id]||0;
        const pct = Math.round(amt/maxVal*100);
        const subcatRows = (c.subcats||[]).map(s => {
          const sk=c.id+'||'+s; const sa=bysubcat[sk]||0;
          return `<div class="subcat-row">
            <div class="subcat-dot" style="background:${c.color}"></div>
            <span class="subcat-name">${s}</span>
            <span class="subcat-amt">${sa>0?fmt(sa):'—'}</span>
            <button class="subcat-del" onclick="deleteSubcat('${c.id}','${s.replace(/'/g,"\\'")}')">×</button>
          </div>`;
        }).join('');
        return `<div class="cat-row">
          <div class="cat-row-top">
            <div class="cat-color" style="background:${c.color}"></div>
            <span class="cat-name-text">${c.name}</span>
            <span style="font-family:var(--mono);font-size:11px;color:var(--text3)">${amt>0?Math.round(amt/totalExp*100)+'%':''}</span>
            <span class="cat-amount-text">${amt>0?fmt(amt):'—'}</span>
            <button class="del-cat-btn" onclick="deleteCat('${c.id}')">×</button>
          </div>
          <div class="cat-bar-bg"><div class="cat-bar-fill" style="background:${c.color};width:${pct}%"></div></div>
          ${subcatRows?`<div class="subcat-list">${subcatRows}</div>`:''}
          <div class="cat-actions">
            <button class="add-sub-btn" onclick="showAddSubcat('${c.id}')">+ subcategoría</button>
          </div>
          <div id="subform_${c.id}" style="display:none;margin-top:6px">
            <div class="form-row">
              <input type="text" class="add-input" id="subinput_${c.id}" placeholder="nombre subcategoría...">
              <button class="add-btn" onclick="addSubcat('${c.id}')">añadir</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="cat-section-title" style="margin-top:12px">nueva categoría</div>
    <div class="add-cat-form">
      <div class="form-row">
        <input type="text" class="add-input" id="newCatInput" placeholder="nombre...">
        <button class="add-btn" onclick="addCat()">añadir</button>
      </div>
    </div>`;
}

function renderSettingsTab() {
  document.getElementById('tabContent').innerHTML = `
    <div class="settings-section">
      <div class="settings-title">sincronización</div>
      <div class="settings-info">${transactions.length} transacciones · ${categories.length} categorías<br>Conectado a Supabase — los datos se sincronizan en tiempo real entre todos tus dispositivos.</div>
      <button class="settings-btn" onclick="forceSync()">↺ sincronizar ahora</button>
      <div class="status-msg" id="syncStatus"></div>
    </div>
    <div class="settings-section">
      <div class="settings-title">exportar datos</div>
      <div class="settings-info">Guarda una copia local de todos tus datos.</div>
      <button class="settings-btn" onclick="exportData()">↓ exportar JSON</button>
    </div>
    <div class="settings-section">
      <div class="settings-title">zona de peligro</div>
      <button class="settings-btn danger" onclick="clearTxs()">⚠ borrar todas las transacciones</button>
    </div>
    <div style="text-align:center;padding:20px 0 4px;font-size:11px;font-family:var(--mono);color:var(--text3)">fintrack · sincronizado con supabase</div>`;
}

// ── NAVIGATION ───────────────────────────────────────────────────
document.getElementById('prevMonth').onclick = () => {
  if (viewMonth===0){viewMonth=11;viewYear--;}else viewMonth--;
  activeCatId=null; render();
};
document.getElementById('nextMonth').onclick = () => {
  if (viewMonth===11){viewMonth=0;viewYear++;}else viewMonth++;
  activeCatId=null; render();
};

// ── MODAL ────────────────────────────────────────────────────────
const fabBtn  = document.getElementById('fabBtn');
const modalBg = document.getElementById('modalBg');
fabBtn.onclick = openModal;
modalBg.addEventListener('click', e => { if (e.target===modalBg) closeModal(); });

function openModal() {
  document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('txAmount').value = '';
  document.getElementById('txNote').value = '';
  document.getElementById('modalStatus').textContent = '';
  populateCats(); populateSubcats();
  modalBg.classList.add('visible');
  fabBtn.classList.add('open');
  setTimeout(()=>document.getElementById('txAmount').focus(), 300);
}
function closeModal() { modalBg.classList.remove('visible'); fabBtn.classList.remove('open'); }

function setType(t) {
  txType = t;
  document.getElementById('typeExp').className = 'type-btn'+(t==='expense'?' active-exp':'');
  document.getElementById('typeInc').className = 'type-btn'+(t==='income'?' active-inc':'');
}
function populateCats() {
  document.getElementById('txCat').innerHTML = categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}
function populateSubcats() {
  const cat = catById(document.getElementById('txCat').value);
  document.getElementById('txSubcat').innerHTML =
    `<option value="">— sin subcategoría</option>` +
    (cat.subcats||[]).map(s=>`<option value="${s}">${s}</option>`).join('');
}

async function saveTx() {
  const amount   = parseFloat(document.getElementById('txAmount').value);
  const category = document.getElementById('txCat').value;
  const subcategory = document.getElementById('txSubcat').value || null;
  const note     = document.getElementById('txNote').value.trim() || null;
  const date     = document.getElementById('txDate').value;
  const status   = document.getElementById('modalStatus');

  if (!amount || amount <= 0) { status.textContent='introduce un importe válido'; status.className='modal-status status-err'; return; }
  if (!date)                   { status.textContent='selecciona una fecha';        status.className='modal-status status-err'; return; }

  status.textContent='guardando...'; status.className='modal-status';
  setSyncStatus('syncing');

  const tx = { id:'tx'+Date.now()+Math.random().toString(36).slice(2,6), type:txType, amount, category, subcategory, note, date };
  try {
    await sbInsert('transactions', tx);
    transactions.unshift(tx);
    localStorage.setItem('ft_txs', JSON.stringify(transactions));
    setSyncStatus('ok');
    status.textContent='✓ guardado'; status.className='modal-status status-ok';
    render();
    setTimeout(closeModal, 500);
  } catch(e) {
    setSyncStatus('err');
    status.textContent='error al guardar: '+e.message; status.className='modal-status status-err';
  }
}

async function deleteTx(id) {
  setSyncStatus('syncing');
  try {
    await sbDelete('transactions', id);
    transactions = transactions.filter(t=>t.id!==id);
    localStorage.setItem('ft_txs', JSON.stringify(transactions));
    setSyncStatus('ok');
    render();
  } catch(e) { setSyncStatus('err'); alert('Error al eliminar: '+e.message); }
}

async function addCat() {
  const inp  = document.getElementById('newCatInput');
  const name = inp.value.trim().toLowerCase();
  if (!name) return;
  const cat = { id:'c'+Date.now(), name, color: PALETTE[categories.length%PALETTE.length], subcats:[], position: categories.length };
  setSyncStatus('syncing');
  try {
    await sbInsert('categories', cat);
    categories.push(cat);
    localStorage.setItem('ft_cats', JSON.stringify(categories));
    inp.value='';
    setSyncStatus('ok');
    render();
  } catch(e) { setSyncStatus('err'); alert('Error: '+e.message); }
}

async function deleteCat(id) {
  if (!confirm('¿Eliminar esta categoría? Los movimientos asociados quedarán sin categoría.')) return;
  setSyncStatus('syncing');
  try {
    await sbDelete('categories', id);
    categories = categories.filter(c=>c.id!==id);
    localStorage.setItem('ft_cats', JSON.stringify(categories));
    setSyncStatus('ok');
    render();
  } catch(e) { setSyncStatus('err'); alert('Error: '+e.message); }
}

function showAddSubcat(catId) {
  const f = document.getElementById('subform_'+catId);
  f.style.display = f.style.display==='none' ? 'block' : 'none';
  if (f.style.display==='block') document.getElementById('subinput_'+catId).focus();
}

async function addSubcat(catId) {
  const inp  = document.getElementById('subinput_'+catId);
  const name = inp.value.trim().toLowerCase();
  if (!name) return;
  const cat = categories.find(c=>c.id===catId);
  if (!cat || cat.subcats.includes(name)) return;
  cat.subcats.push(name);
  setSyncStatus('syncing');
  try {
    await sbUpdate('categories', catId, { subcats: cat.subcats });
    localStorage.setItem('ft_cats', JSON.stringify(categories));
    inp.value='';
    setSyncStatus('ok');
    render();
  } catch(e) { setSyncStatus('err'); cat.subcats.pop(); alert('Error: '+e.message); }
}

async function deleteSubcat(catId, subName) {
  const cat = categories.find(c=>c.id===catId);
  if (!cat) return;
  cat.subcats = cat.subcats.filter(s=>s!==subName);
  setSyncStatus('syncing');
  try {
    await sbUpdate('categories', catId, { subcats: cat.subcats });
    localStorage.setItem('ft_cats', JSON.stringify(categories));
    setSyncStatus('ok');
    render();
  } catch(e) { setSyncStatus('err'); cat.subcats.push(subName); alert('Error: '+e.message); }
}

async function forceSync() {
  const status = document.getElementById('syncStatus');
  status.textContent='sincronizando...'; status.className='status-msg';
  setSyncStatus('syncing');
  try {
    categories   = await sbGet('categories','order=position.asc');
    transactions = await sbGet('transactions','order=date.desc');
    localStorage.setItem('ft_cats', JSON.stringify(categories));
    localStorage.setItem('ft_txs',  JSON.stringify(transactions));
    setSyncStatus('ok');
    status.textContent='✓ sincronizado'; status.className='status-msg status-ok';
    render();
  } catch(e) { setSyncStatus('err'); status.textContent='✗ error: '+e.message; status.className='status-msg status-err'; }
}

function exportData() {
  const json = JSON.stringify({ transactions, categories }, null, 2);
  const blob = new Blob([json],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fintrack_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

async function clearTxs() {
  if (!confirm('¿Borrar TODAS las transacciones? Esta acción no se puede deshacer.')) return;
  setSyncStatus('syncing');
  try {
    // Delete all via filter that's always true
    await fetch(`${SUPABASE_URL}/rest/v1/transactions?id=neq.NOOP`, { method:'DELETE', headers });
    transactions = [];
    localStorage.setItem('ft_txs', JSON.stringify([]));
    setSyncStatus('ok');
    render();
  } catch(e) { setSyncStatus('err'); alert('Error: '+e.message); }
}

// ── START ────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
